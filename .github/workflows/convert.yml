name: Convert Notion JSON to Markdown

on:
  push:
    branches:
      - main
    paths:
      - '_raw/**/*.json'

concurrency:
  group: convert-markdown
  cancel-in-progress: false
  
jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run converter
        run: |
          find _raw -name "*.json" > all_files.txt
          python scripts/convert.py all_files.txt

      - name: Commit markdown files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brain-stem/
          git diff --staged --quiet || git commit -m "Convert: Notion JSON → Markdown"
          git pull --rebase origin main
          git push
